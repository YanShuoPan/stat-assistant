prompt_hint: 'This question involves multiple testing or selective inference. When
  answering:

  - Distinguish between FWER and FDR control and when each is appropriate

  - Discuss the dependence structure of test statistics and its impact

  - Cover adaptive procedures (Storey q-value, adaptive BH)

  - Address post-selection inference and conditional validity

  - Explain conformal prediction coverage guarantees and exchangeability assumptions

  - Compare classical (Bonferroni, Holm) vs modern (BH, knockoffs) approaches

  '
