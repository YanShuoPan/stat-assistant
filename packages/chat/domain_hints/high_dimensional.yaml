prompt_hint: |
  This question involves high-dimensional statistics. When answering:
  - Emphasize the p >> n challenge and why classical methods break down
  - Discuss variable selection consistency (sparsistency) and oracle properties
  - Cover regularization paths and tuning parameter selection (CV, information criteria)
  - Compare penalized methods (LASSO, SCAD, MCP, elastic net) when relevant
  - Mention computational considerations for large p
  - Discuss finite-sample vs asymptotic properties
