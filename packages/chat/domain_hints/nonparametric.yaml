prompt_hint: |
  This question involves nonparametric or semiparametric methods. When answering:
  - Discuss when and why to avoid distributional assumptions
  - Cover the tradeoff between flexibility and efficiency
  - Address bandwidth/smoothing parameter selection for kernel methods
