prompt_hint: 'This question involves statistical inference or hypothesis testing.
  When answering:

  - Distinguish between frequentist and Bayesian inference frameworks

  - Discuss optimality criteria (minimax, admissibility, UMP tests)

  - Cover asymptotic theory (consistency, efficiency, normality) and finite-sample
  properties

  - Address bootstrap and resampling methods for complex settings

  - Compare parametric vs nonparametric inference approaches

  - Mention connections between testing, confidence intervals, and estimation

  '
