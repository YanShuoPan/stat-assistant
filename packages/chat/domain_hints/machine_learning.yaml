prompt_hint: |
  This question involves machine learning. When answering:
  - Emphasize the bias-variance tradeoff and generalization performance
  - Discuss model selection and hyperparameter tuning strategies
  - Cover evaluation metrics appropriate to the task (accuracy, AUC, MSE, etc.)
  - Compare statistical learning theory perspectives with practical ML engineering
  - Mention interpretability vs performance tradeoffs
  - Discuss when simpler statistical models may be preferable to complex ML models
