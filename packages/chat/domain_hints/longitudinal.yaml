prompt_hint: 'This question involves longitudinal or mixed effects analysis. When
  answering:

  - Distinguish between population-averaged (GEE) and subject-specific (mixed model)
  approaches

  - Discuss random effects specification (random intercept, random slope)

  - Cover correlation structures for repeated measures

  - Address missing data and dropout in longitudinal studies

  - Compare likelihood-based vs GEE approaches and their assumptions

  - Mention model diagnostics and computational considerations (lme4, nlme)

  '
